{% extends "base.html" %}

{% block content %}

<div class="card p-6">

    <h2>Register</h2>

    <form method="POST" style="display:flex; flex-direction:column; gap:10px;">

        <input name="username" placeholder="username" style="padding:10px; color:black;">
        <input name="password" type="password" placeholder="password" style="padding:10px; color:black;">

        <button class="btn blue">Create account</button>

    </form>

</div>

{% endblock %}
