{% extends "base.html" %}

{% block content %}

<div class="flex justify-center items-center h-[80vh]">

<form method="POST" class="card p-8 w-96">

    <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500 text-red-300 p-2 rounded mb-4">
        {{ error }}
    </div>
    {% endif %}

    <input name="username"
           placeholder="Username"
           class="w-full p-3 mb-3 rounded bg-black/40 border border-white/10">

    <input name="password"
           type="password"
           placeholder="Password"
           class="w-full p-3 mb-5 rounded bg-black/40 border border-white/10">

    <button class="btn blue w-full justify-center">
        Create account
    </button>

    <!-- BACK TO LOGIN -->
    <div class="text-center mt-5 text-gray-400 text-sm">

        <span>Already have an account?</span>

        <a href="/login"
           class="ml-1 font-bold text-white px-3 py-1 rounded-lg"
           style="background: linear-gradient(135deg,#3b82f6,#2563eb); display:inline-block;">
            Login
        </a>

    </div>

</form>

</div>

{% endblock %}
