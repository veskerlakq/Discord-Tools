<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0b1220;
    color: white;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
}

/* BUTTON */
.btn {
    padding: 10px 14px;
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: 0.2s ease;
}

.btn.blue { background:#2563eb; color:white; }
.btn.red { background:#dc2626; color:white; }
.btn.yellow { background:#f59e0b; color:black; }

.btn:hover {
    transform: translateY(-2px) scale(1.05);
    filter: brightness(1.2);
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

    <div style="font-weight: bold; font-size: 18px;">
        Discord Tools
    </div>

    <div>

        {% if current_user.is_authenticated %}

        <div style="display:flex; gap:12px; align-items:center;">

            <span>
                <i class="fa-solid fa-user"></i>
                {{ current_user.username }}
            </span>

            {% if current_user.plan == "premium" %}
                <div class="btn yellow">Premium</div>
            {% endif %}

            <a href="/logout" class="btn red">Logout</a>

        </div>

        {% else %}

        <div style="display:flex; gap:10px;">
            <a href="/login" class="btn blue">Login</a>
            <a href="/register" class="btn yellow">Sign up</a>
        </div>

        {% endif %}

    </div>

</div>

<!-- CONTENT (ЭТО ГЛАВНОЕ, ЧТО У ТЕБЯ СЛОМАЛОСЬ) -->
<div style="padding: 20px; min-height: 80vh;">
    {% block content %}{% endblock %}
</div>

</body>
</html>
