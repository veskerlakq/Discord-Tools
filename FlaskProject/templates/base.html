<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin:0; font-family:sans-serif; background:#0b1220; color:white; }

.sidebar {
    width:220px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:#0a0f1a;
    padding:20px;
}

.main {
    margin-left:240px;
    padding:20px;
}

.card {
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px;
}
</style>

</head>

<body>

{% if current_user.is_authenticated %}

<div class="sidebar">
    <h2>SaaS 3.1</h2>

    <a href="/dashboard">Dashboard</a><br>
    <a href="/templates">Templates</a><br>
    <a href="/create-template">Create</a><br><br>

    <a href="/logout">Logout</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

{% else %}

<div class="main">
    {% block content %}{% endblock %}
</div>

{% endif %}

</body>
</html>
