<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0b1220;
    color:white;
}

.btn {
    padding:10px 14px;
    border-radius:10px;
    display:inline-flex;
    gap:8px;
    text-decoration:none;
    transition:0.2s;
}

.btn.blue { background:#2563eb; color:white; }
.btn.red { background:#dc2626; color:white; }

.btn:hover { transform:scale(1.05); }

.topbar {
    display:flex;
    justify-content:space-between;
    padding:16px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<div class="topbar">

    <div><b>SaaS 2.0</b></div>

    <div>

        {% if current_user.is_authenticated %}

            <span>{{ current_user.username }}</span>
            <a class="btn blue" href="/dashboard">Dashboard</a>
            <a class="btn red" href="/logout">Logout</a>

        {% else %}

            <a class="btn blue" href="/login">Login</a>
            <a class="btn blue" href="/register">Sign up</a>

        {% endif %}

    </div>

</div>

<div style="padding:20px;">
    {% block content %}{% endblock %}
</div>

<footer style="margin-top:40px; padding:20px; border-top:1px solid rgba(255,255,255,0.1); font-size:12px; opacity:0.7;">
    Privacy Policy: We do not store or sell your data. By using this service you agree to basic data processing for authentication.
</footer>

</body>
</html>
