<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #0b1220;
    color: white;
}

.btn {
    padding: 10px 14px;
    border-radius: 10px;
    display: inline-flex;
    gap: 8px;
    text-decoration: none;
    transition: 0.2s;
}

.btn.blue { background:#2563eb; color:white; }
.btn.red { background:#dc2626; color:white; }
.btn.yellow { background:#f59e0b; color:black; }

.btn:hover {
    transform: scale(1.05);
    filter: brightness(1.2);
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
}

.topbar {
    display:flex;
    justify-content:space-between;
    padding:16px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<div class="topbar">

    <div class="font-bold">Discord Tools</div>

    <div>

        {% if current_user.is_authenticated %}

        <div style="display:flex; gap:10px; align-items:center;">

            <span>{{ current_user.username }}</span>

            {% if current_user.plan == "premium" %}
            <div class="btn yellow">Premium</div>
            {% endif %}

            <a href="/logout" class="btn red">Logout</a>

        </div>

        {% else %}

        <div style="display:flex; gap:10px;">
            <a href="/login" class="btn blue">Login</a>
            <a href="/register" class="btn yellow">Sign up</a>
        </div>

        {% endif %}

    </div>

</div>

<div style="padding:20px;">
    {% block content %}{% endblock %}
</div>

</body>
</html>
