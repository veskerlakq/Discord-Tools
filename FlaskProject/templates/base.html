<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { font-family: sans-serif; }

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
}

.btn {
    padding: 10px 14px;
    border-radius: 12px;
    display: inline-flex;
    gap: 8px;
    text-decoration: none;
    transition: 0.2s;
}

.btn.blue { background:#2563eb; color:white; }
.btn.red { background:#dc2626; color:white; }
.btn.yellow { background:#f59e0b; color:black; }

.btn:hover { transform: scale(1.05); }
</style>

</head>

<body class="bg-[#0b1220] text-white">

<!-- TOP BAR -->
<div class="flex justify-between items-center px-6 py-4 border-b border-white/10">

    <div class="font-bold text-xl">
        Discord Tools
    </div>

    <div class="flex items-center gap-4">

        <!-- USER SAFE BLOCK -->
{% if current_user.is_authenticated %}

<div class="flex items-center gap-3">

    <span>
        <i class="fa-solid fa-user"></i>
        {{ current_user.username }}
    </span>

    {% if current_user.plan is defined and current_user.plan == "premium" %}
        <div class="btn yellow">Premium</div>
    {% endif %}

    <a href="/logout" class="btn red">Logout</a>

</div>

{% else %}

<div class="flex gap-2">
    <a href="/login" class="btn blue">Login</a>
    <a href="/register" class="btn yellow">Sign up</a>
</div>

{% endif %}

    </div>
</div>

<div class="p-6">
    {% block content %}{% endblock %}
</div>

</body>
</html>
