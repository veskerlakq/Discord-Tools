{% extends "base.html" %}

{% block content %}

<a href="/templates" class="btn blue mb-4">← Back</a>

<div class="card p-6">

    <h1 class="text-2xl font-bold">{{ tpl["name"] }}</h1>

    <p class="text-gray-400 mt-2">{{ tpl["description"] }}</p>

    {% if tpl["image"] %}
    <img src="{{ tpl["image"] }}" class="mt-4 rounded" style="max-width:100%;">
    {% endif %}

    {% if tpl["link"] %}
    <div class="mt-4">
        <a href="{{ tpl['link'] }}" target="_blank" class="text-blue-400 underline">
            Open Template Link
        </a>
    </div>
    {% endif %}

</div>

{% endblock %}
