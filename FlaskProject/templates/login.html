{% extends "base.html" %}

{% block content %}

<div class="flex justify-center items-center h-[80vh]">

<form method="POST" class="card p-8 w-96">

    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    {% if error %}
    <div class="bg-red-500/20 border border-red-500 text-red-300 p-2 rounded mb-4">
        {{ error }}
    </div>
    {% endif %}

    <input name="username"
           placeholder="Username"
           class="w-full p-3 mb-3 rounded bg-black/40 border border-white/10">

    <input name="password"
           type="password"
           placeholder="Password"
           class="w-full p-3 mb-3 rounded bg-black/40 border border-white/10">

    <!-- REMEMBER ME -->
    <label class="flex items-center gap-2 text-sm text-gray-300 mb-5">
        <input type="checkbox" name="remember">
        Remember me
    </label>

    <button class="btn blue w-full justify-center">
        Login
    </button>

    <div class="text-center mt-5 text-gray-400 text-sm">
        Don’t have an account?
        <a href="/register"
           class="ml-1 px-3 py-1 rounded-lg text-white font-bold"
           style="background: linear-gradient(135deg,#3b82f6,#2563eb);">
            Sign up
        </a>
    </div>

</form>

</div>

{% endblock %}
