{% extends "auth_base.html" %}

{% block content %}

<div class="card p-6 w-96">

    <h2 class="text-xl mb-4">Login</h2>

    <form method="POST" class="flex flex-col gap-3">

        <input name="username" placeholder="Username" class="p-2 text-black rounded">
        <input name="password" type="password" placeholder="Password" class="p-2 text-black rounded">

        <button class="btn blue">Login</button>

    </form>

</div>

{% endblock %}
