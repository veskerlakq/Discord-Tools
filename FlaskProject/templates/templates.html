{% extends "base.html" %}

{% block content %}

<!-- HEADER ACTIONS -->
<div class="flex items-center justify-between mb-4">

    <a href="/dashboard" class="btn blue">
        ← Back
    </a>

    <a href="/create-template" class="btn blue">
        + Create Template
    </a>

</div>

<!-- GRID -->
<div class="grid grid-cols-3 gap-6">

{% for t in templates %}

<div class="card p-4">

    {% if t["image"] %}
    <img src="{{ t['image'] }}" class="rounded mb-3" style="width:100%; height:160px; object-fit:cover;">
    {% endif %}

    <div class="text-xl font-bold">{{ t["name"] }}</div>

    <div class="text-gray-400 mt-1">{{ t["description"] }}</div>

    <div class="text-xs text-gray-500 mt-2">
        by {{ t["author"] }}
    </div>

    <a href="/use-template/{{ t['id'] }}" class="btn blue mt-3">
        Open
    </a>

</div>

{% endfor %}

</div>

{% endblock %}
